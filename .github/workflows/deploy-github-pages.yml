name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system fonts & LibreOffice
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk libreoffice-writer 2>/dev/null || true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Markdown openpyxl bleach python-docx qrcode pillow

      - name: Build static site
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          if [[ "$REPO_NAME" == *.github.io ]]; then
            export SITE_BASE_PATH=""
          else
            export SITE_BASE_PATH="/$REPO_NAME"
          fi
          python scripts/build_static_site.py

      - name: Build vocal & extra pages
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          if [[ "$REPO_NAME" == *.github.io ]]; then
            export SITE_BASE_PATH=""
          else
            export SITE_BASE_PATH="/$REPO_NAME"
          fi
          python scripts/build_vocal_extra.py

      - name: Build ebooks
        run: python scripts/build_ebook.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: outputs/world-instruments-static

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
