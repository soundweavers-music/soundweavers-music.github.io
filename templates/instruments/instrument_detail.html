{% extends "base.html" %}

{% block title %}{{ instrument.name }}｜世界樂器百科{% endblock %}

{% block content %}
<main class="instrument-page">
  <div class="breadcrumb">
    <a href="{% url 'home' %}">世界樂器百科</a>
    <span>/</span>
    <a href="{{ instrument.category.get_absolute_url }}">{{ instrument.category }}</a>
  </div>

  <header class="instrument-header">
    <div>
      <h1 class="instrument-title">{{ instrument.name }}</h1>
      <span class="category-badge">{{ instrument.category.name }}</span>
    </div>
  </header>

  <section class="instrument-section">
    <h2>介紹</h2>
    <article class="markdown-body">
      {{ introduction_html|safe }}
    </article>
  </section>
</main>
{% endblock %}
